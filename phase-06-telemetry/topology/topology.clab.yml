name: netaform-p6
prefix: clab

topology:
  nodes:
    # --- Network Devices ---
    isp-rtr:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - configs/isp-rtr/frr.conf:/etc/frr/frr.conf
        - configs/isp-rtr/daemons:/etc/frr/daemons

    edge-1:
      kind: ceos
      image: ceos:4.35.1F
      startup-config: configs/edge-1/startup-config

    dist-1:
      kind: ceos
      image: ceos:4.35.1F
      startup-config: configs/dist-1/startup-config

    dist-2:
      kind: ceos
      image: ceos:4.35.1F
      startup-config: configs/dist-2/startup-config

    host-eng:
      kind: linux
      image: wbitt/network-multitool:latest
      exec:
        - ip addr add 10.0.10.100/24 dev eth1
        - ip route add default via 10.0.10.2

    host-sales:
      kind: linux
      image: wbitt/network-multitool:latest
      exec:
        - ip addr add 10.0.20.100/24 dev eth1
        - ip route add default via 10.0.20.3

    host-server:
      kind: linux
      image: wbitt/network-multitool:latest
      exec:
        - ip addr add 10.0.30.100/24 dev eth1
        - ip route add default via 10.0.30.3

    # --- Telemetry Stack ---
    gnmic:
      kind: linux
      image: ghcr.io/openconfig/gnmic:latest
      binds:
        - ../configs/gnmic.yml:/app/gnmic.yml:ro
      cmd: --config /app/gnmic.yml subscribe

    prometheus:
      kind: linux
      image: prom/prometheus:latest
      binds:
        - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      ports:
        - 9090:9090

    grafana:
      kind: linux
      image: grafana/grafana:latest
      binds:
        - ../configs/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
        - ../configs/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
        - ../dashboards:/var/lib/grafana/dashboards:ro
      ports:
        - 3000:3000
      env:
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_SECURITY_ADMIN_USER: admin

  links:
    - endpoints: ["isp-rtr:eth1", "edge-1:eth1"]
    - endpoints: ["edge-1:eth2", "dist-1:eth1"]
    - endpoints: ["edge-1:eth3", "dist-2:eth1"]
    - endpoints: ["dist-1:eth2", "dist-2:eth2"]
    - endpoints: ["dist-1:eth3", "host-eng:eth1"]
    - endpoints: ["dist-2:eth3", "host-sales:eth1"]
    - endpoints: ["dist-2:eth4", "host-server:eth1"]
